// ── 10: Syscalls & Shell ──
{
  title: "Syscalls & Shell",
  icon: "🐚",
  cards: [
    { t:"Systemaufrufe – Überblick", b:"Aufgabe des BS: <b>Bereitstellen von Abstraktionen</b> durch System Calls. Der POSIX-Standard beschreibt die Systemaufrufe der UNIX-Welt. Andere Betriebssysteme haben ähnliche Aufrufe." },
    { t:"Ablauf eines Systemaufrufs (am Beispiel read())", b:"<b>1.</b> Programm ruft Bibliotheks-Routine <code>read(fd, buffer, nbytes)</code> auf (Benutzermodus). <b>2.</b> Parameter werden auf den Stack gelegt, Opcode für BS-Routine in Register geladen. <b>3.</b> <b>TRAP</b>: Kontextwechsel, BS-Routine für read() wird im <b>Kernel-Mode</b> ausgeführt. <b>4.</b> BS sichert Prozessorstatus, führt Operation aus. Aufrufender Thread kann blockiert werden (z.B. Warten auf Eingabe). <b>5.</b> Rückkehr über Scheduler (nicht unbedingt sofort zum aufrufenden Thread)." },
    { t:"POSIX-Systemaufrufe", b:"<b>Prozesse:</b> fork(), waitpid(), execve(), exit(). <b>Dateien:</b> open(), close(), read(), write(), lseek(). <b>Verzeichnisse:</b> mkdir(). <b>Verschiedenes:</b> chmod(), kill() (Signal senden)." },
    { t:"Shell – Benutzungsschnittstelle", b:"Die Shell ist der <b>Kommandointerpreter</b>: nimmt Befehle entgegen, startet Programme. Kein Teil des Kernels, sondern ein normaler Prozess. Arbeitsweise: <code>fork()</code> → Kindprozess führt Programm aus → Shell wartet." },
    { t:"Shell – Pipes & Umleitung", b:"<b>Eingabe- und Ausgabeumleitung</b>: z.B. <code>sort < file1 > file2</code>. <b>Pipes</b>: Verknüpfung von Programmen, z.B. <code>cat file1 file2 file3 | sort | lpr</code>. <b>Ausführung im Hintergrund</b>: <code>sort < file1 | lpr &</code>. Die Shell ist das Werkzeug, das Pipes kombinieren kann." },
    { t:"Schutz und Sicherheit", b:"<b>Zugriffskontrolle</b>: Dateirechte (r/w/x für Owner/Group/Others). <b>Schutzmechanismen</b>: Speicherisolation (Paging), Privilegstufen (Kern-/Benutzermodus). System Calls als kontrollierte Schnittstelle zum Kernel." }
  ],
  questions: [
    { q:"Beschreibe den Ablauf eines read()-Systemaufrufs.", a:"Das Programm ruft die Bibliotheks-Routine read() auf, Parameter werden auf den Stack gelegt und der Opcode ins Register. Durch den TRAP findet ein Kontextwechsel statt, und die BS-Routine wird im Kernel-Mode ausgeführt. Rückkehr erfolgt über den Scheduler." },
    { q:"Nenne mindestens 8 POSIX-Systemaufrufe aus der Vorlesung.", a:"fork() (Kindprozess erzeugen), waitpid() (auf Kind warten), execve() (anderes Programm ausführen), exit() (beenden), open() (Datei öffnen), close() (schließen), read() (lesen), write() (schreiben), lseek() (Dateizeiger verschieben), mkdir() (Verzeichnis erzeugen), chmod() (Rechte ändern), kill() (Signal senden)." },
    { q:"Was passiert bei 'cat file1 file2 | sort | lpr' in der Shell?", a:"Die Shell verbindet drei Programme über Pipes: Die Ausgabe von cat (Dateien zusammenfügen) wird als Eingabe an sort (sortieren) weitergeleitet, dessen Ausgabe wiederum an lpr (Drucken) geht. Die Shell erzeugt dafür mehrere Kindprozesse." },
    { q:"Warum ist die Shell kein Teil des Kernels?", a:"Die Shell ist ein normaler User-Mode-Prozess, der über Systemaufrufe mit dem Kernel kommuniziert. Sie nutzt fork() zum Erzeugen von Kindprozessen, die dann die eingegebenen Befehle ausführen. Sie ist austauschbar und hat keine besonderen Privilegien." },
    { q:"Was passiert beim TRAP-Befehl im Ablauf eines Systemaufrufs?", a:"Der TRAP löst einen Kontextwechsel aus: Die CPU wechselt vom Benutzermodus in den Kernmodus. Das BS sichert den vollständigen Prozessorstatus in der Thread-/Prozesstabelle und führt dann die angeforderte Betriebssystem-Routine im privilegierten Modus aus." }
  ],
  flashcards: [

    { front:"POSIX Prozess-Syscalls?", back:"fork(), waitpid(), execve(), exit()." },
    { front:"POSIX Datei-Syscalls?", back:"open(), close(), read(), write(), lseek()." },
    { front:"Shell: wie wird ein Befehl ausgeführt?", back:"fork() → Kind führt Programm aus → Shell wartet." },
    { front:"Pipe in der Shell?", back:"Verknüpfung: cat f1 f2 | sort | lpr. Ausgabe → Eingabe des nächsten." },
    { front:"Was macht der TRAP?", back:"Kontextwechsel: Benutzermodus → Kernmodus. BS sichert Prozessorstatus, führt Kernel-Routine aus." }
  ]
}

let currentTopic=0,currentMode='study',quizState={},fcIndex=0,fcFlipped=false,fcResults={},showOnlyWrong=false;

function init(){renderTabs();bindModes();render()}
function renderTabs(){const w=document.getElementById('tabs');w.innerHTML=DATA.map((d,i)=>`<button class="tab${i===currentTopic?' active':''}" data-idx="${i}">${d.icon} ${d.title}</button>`).join('');w.querySelectorAll('.tab').forEach(t=>{t.onclick=()=>{currentTopic=+t.dataset.idx;document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');fcIndex=0;fcFlipped=false;showOnlyWrong=false;render()}})}
function bindModes(){document.querySelectorAll('.mode-btn').forEach(b=>{b.onclick=()=>{currentMode=b.dataset.mode;document.querySelectorAll('.mode-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');fcIndex=0;fcFlipped=false;showOnlyWrong=false;render()}})}
function render(){const el=document.getElementById('content');if(currentMode==='study')renderStudy(el);else if(currentMode==='quiz')renderQuiz(el);else renderFlash(el)}
function renderStudy(el){const d=DATA[currentTopic];el.innerHTML=`<div class="section-title fade-in"><span class="emoji">${d.icon}</span> ${d.title} – Lernseiten</div>`+d.cards.map(c=>{let tg='';if(c.tag==='wichtig')tg='<span class="tag tag-wichtig">WICHTIG</span>';if(c.tag==='formel')tg='<span class="tag tag-formel">FORMEL</span>';if(c.tag==='def')tg='<span class="tag tag-def">DEFINITION</span>';return`<div class="study-card fade-in"><h3>${c.t}${tg}</h3><p>${c.b}</p></div>`}).join('')}
function renderQuiz(el){const d=DATA[currentTopic];if(!quizState[currentTopic])quizState[currentTopic]={};const qs=quizState[currentTopic];let questions=d.questions.map((q,i)=>({...q,idx:i}));if(showOnlyWrong)questions=questions.filter(q=>qs[q.idx]==='wrong');const wc=d.questions.filter((_,i)=>qs[i]==='wrong').length,cc=d.questions.filter((_,i)=>qs[i]==='correct').length;el.innerHTML=`<div class="section-title fade-in"><span class="emoji">${d.icon}</span> ${d.title} – Klausurfragen</div><div class="stats-bar fade-in"><span class="stats-info">✅ ${cc} gewusst · ❌ ${wc} wiederholen · ${d.questions.length} Fragen</span>${wc>0?`<button class="filter-btn ${showOnlyWrong?'active':''}" id="filterWrong">🔁 Nur Schwächen (${wc})</button>`:''}</div>${questions.length===0?'<p style="color:var(--text3);text-align:center;padding:2rem">Keine Fragen mit ❌ – gut gemacht! 🎉</p>':''}${questions.map(q=>{const s=qs[q.idx];return`<div class="quiz-card fade-in"><div class="quiz-q">${q.idx+1}. ${q.q}</div><div class="quiz-a" id="qa-${q.idx}">${q.a}</div><div class="quiz-btns"><button class="q-btn show-btn" onclick="toggleAnswer(${q.idx})">Antwort zeigen</button><button class="q-btn${s==='correct'?' correct':''}" onclick="markQ(${q.idx},'correct')">✅ Gewusst</button><button class="q-btn${s==='wrong'?' wrong':''}" onclick="markQ(${q.idx},'wrong')">❌ Wiederholen</button></div></div>`}).join('')}`;const fb=document.getElementById('filterWrong');if(fb)fb.onclick=()=>{showOnlyWrong=!showOnlyWrong;render()}}
function toggleAnswer(i){document.getElementById('qa-'+i).classList.toggle('visible')}
function markQ(i,v){if(!quizState[currentTopic])quizState[currentTopic]={};quizState[currentTopic][i]=v;render()}
function renderFlash(el){const d=DATA[currentTopic],fcs=d.flashcards;if(!fcResults[currentTopic])fcResults[currentTopic]={};const res=fcResults[currentTopic],kc=Object.values(res).filter(v=>v==='know').length,rc=Object.values(res).filter(v=>v==='repeat').length,prog=fcs.length>0?((kc+rc)/fcs.length*100):0;if(fcIndex>=fcs.length){el.innerHTML=`<div class="fc-container fade-in"><div class="section-title"><span class="emoji">${d.icon}</span> ${d.title} – Karteikarten</div><div style="text-align:center;padding:3rem 1rem"><div style="font-size:2.5rem;margin-bottom:1rem">🎯</div><div style="font-size:1.1rem;font-weight:600;margin-bottom:0.5rem">Alle ${fcs.length} Karten durchgearbeitet!</div><div class="fc-score" style="justify-content:center;margin-bottom:1.5rem"><span class="s-know">✅ ${kc} gewusst</span><span class="s-repeat">🔁 ${rc} wiederholen</span></div>${rc>0?`<button class="fc-btn" onclick="restartFlashWrong()">🔁 Nur Schwächen</button>`:''}<button class="fc-btn" onclick="restartFlash()" style="margin-left:0.5rem">↩ Alle nochmal</button></div></div>`;return}const card=fcs[fcIndex];el.innerHTML=`<div class="fc-container fade-in"><div class="section-title"><span class="emoji">${d.icon}</span> ${d.title} – Karteikarten</div><div class="fc-progress"><span>${fcIndex+1} / ${fcs.length}</span><div class="fc-bar"><div class="fc-bar-fill" style="width:${prog}%"></div></div><div class="fc-score"><span class="s-know">✅ ${kc}</span><span class="s-repeat">🔁 ${rc}</span></div></div><div class="fc-card-wrap" onclick="flipCard()"><div class="fc-card${fcFlipped?' flipped':''}"><div class="fc-face fc-front"><div class="fc-label">Frage</div><div class="fc-text">${card.front}</div><div class="fc-hint">Klicken zum Umdrehen</div></div><div class="fc-face fc-back"><div class="fc-label">Antwort</div><div class="fc-text">${card.back}</div><div class="fc-hint">Klicken zum Zurückdrehen</div></div></div></div><div class="fc-controls"><button class="fc-btn fc-repeat" onclick="fcMark('repeat')">🔁 Wiederholen</button><button class="fc-btn fc-know" onclick="fcMark('know')">✅ Gewusst</button></div></div>`}
function flipCard(){fcFlipped=!fcFlipped;const c=document.querySelector('.fc-card');if(c)c.classList.toggle('flipped',fcFlipped)}
function fcMark(v){if(!fcResults[currentTopic])fcResults[currentTopic]={};fcResults[currentTopic][fcIndex]=v;fcIndex++;fcFlipped=false;render()}
function restartFlash(){fcResults[currentTopic]={};fcIndex=0;fcFlipped=false;render()}
function restartFlashWrong(){const d=DATA[currentTopic],res=fcResults[currentTopic]||{};const ri=Object.entries(res).filter(([k,v])=>v==='repeat').map(([k])=>+k);if(ri.length===0){restartFlash();return}d._orig=d._orig||[...d.flashcards];d.flashcards=ri.map(i=>(d._orig||d.flashcards)[i]);fcResults[currentTopic]={};fcIndex=0;fcFlipped=false;render()}
document.addEventListener('keydown',e=>{if(currentMode!=='flash')return;if(e.key===' '||e.key==='Enter'){e.preventDefault();flipCard()}if(e.key==='ArrowRight'||e.key==='2')fcMark('know');if(e.key==='ArrowLeft'||e.key==='1')fcMark('repeat')});
init();
</script>
</body>
</html>
